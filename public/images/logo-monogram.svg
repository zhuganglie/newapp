<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- paper background -->
  <rect width="200" height="200" fill="#f4f1ea"/>

  <!-- outer circle -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#0f0e0c" stroke-width="1.5"/>

  <!-- horizontal axis (solid) -->
  <line x1="18" y1="100" x2="182" y2="100" stroke="#0f0e0c" stroke-width="1"/>

  <!-- vertical axis (dashed) -->
  <line x1="100" y1="18" x2="100" y2="182" stroke="#0f0e0c" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- axis endpoint squares -->
  <rect x="12" y="96" width="8" height="8" fill="#0f0e0c"/>
  <rect x="180" y="96" width="8" height="8" fill="#0f0e0c"/>

  <!-- state: triangle (above axis) -->
  <polygon points="100,46 144,130 56,130" fill="#0f0e0c"/>

  <!-- society: circle (below axis) in seal red -->
  <circle cx="100" cy="130" r="20" fill="#8a1c13"/>
</svg>
