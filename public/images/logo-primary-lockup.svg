<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <style>
      .cn { font-family: 'Noto Serif CJK SC', 'Noto Serif SC', serif; font-weight: 900; }
      .en { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 600; font-style: italic; }
      .kicker { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 500; letter-spacing: 2.2px; }
    </style>
  </defs>

  <!-- SEAL -->
  <g transform="translate(20, 28)">
    <rect x="0" y="0" width="104" height="104" fill="#8a1c13"/>
    <rect x="6" y="6" width="92" height="92" fill="none" stroke="#f4f1ea" stroke-width="1.5" opacity="0.35"/>
    <text x="52" y="80" text-anchor="middle" class="cn" font-size="72" fill="#f4f1ea">政</text>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(148, 0)">
    <text x="0" y="68" class="cn" font-size="34" fill="#0f0e0c" letter-spacing="1.5">政治的逻辑</text>
    <line x1="0" y1="84" x2="56" y2="84" stroke="#0f0e0c" stroke-width="1"/>
    <text x="0" y="106" class="en" font-size="18" fill="#3a3832">The Logic of Politics</text>
    <text x="0" y="128" class="kicker" font-size="9" fill="#6b665c">COMPARATIVE · ANALYTICAL</text>
  </g>
</svg>
